<amp-analytics type="googleanalytics" id="{{site.owner.google.analytics}}">
	<script type="application/json">
	{
	  "vars": {
	    "account": "{{site.owner.google.analytics}}"
	  },
	  "triggers": {
	    "trackPageview": {
	      "on": "visible",
	      "request": "pageview"
	    }
	  }
	}
	</script>
</amp-analytics>
